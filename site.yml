---
# =============================================================================
# Syntalix-Orion V2 - Site Master Playbook
# =============================================================================
# Playbook maestro de orquestación para Syntalix-Orion V2.
#
# Este playbook es ejecutado por la TUI después de generar ansible_vars.yml.
# Instala dinámicamente únicamente los roles seleccionados por el usuario.
#
# Uso:
#   ansible-playbook -i inventory site.yml -e @ansible_vars.yml
#
# Ejecución filtrada por tags:
#   ansible-playbook -i inventory site.yml -e @ansible_vars.yml --tags "core,data"
#
# =============================================================================

- name: "Syntalix-Orion V2 - Despliegue de Infraestructura"
  hosts: all
  become: yes
  gather_facts: yes
  serial: 1  # Ejecutar en un nodo a la vez para evitar conflictos

  # ---------------------------------------------------------------------------
  # VARIABLES DEL PLAYBOOK
  # ---------------------------------------------------------------------------
  vars:
    # Red interna de Docker Swarm
    docker_network_name: "{{ TRAEFIK__INTERNAL_NETWORK | default('SyntalixNet') }}"
    docker_network_driver: overlay
    docker_network_attachable: yes

    # Configuración de logging
    ansible_enhanced_logging: yes

  # ---------------------------------------------------------------------------
  # PRE-TASKS: Validación y Configuración Inicial
  # ---------------------------------------------------------------------------
  pre_tasks:

    # -------------------------------------------------------------------------
    # Validación de Seguridad Obligatoria
    # -------------------------------------------------------------------------
    - name: "🔒 Validar que ansible_enabled_roles esté definido"
      ansible.builtin.assert:
        that:
          - ansible_enabled_roles is defined
          - ansible_enabled_roles | length > 0
        fail_msg: |
          ╔═══════════════════════════════════════════════════════════════════════╗
          ║                        ERROR DE SEGURIDAD                           ║
          ╠═══════════════════════════════════════════════════════════════════════╣
          ║ La variable 'ansible_enabled_roles' no está definida.              ║
          ║                                                                          ║
          ║ Esto impide instalaciones accidentales de toda la infraestructura.  ║
          ║                                                                          ║
          ║ SOLUCIÓN:                                                            ║
          ║ Ejecuta el playbook usando el archivo generado por la TUI:          ║
          ║                                                                          ║
          ║   ansible-playbook -i inventory site.yml -e @ansible_vars.yml        ║
          ║                                                                          ║
          ║ El archivo ansible_vars.yml es generado automáticamente por la TUI║
          ║ con las aplicaciones seleccionadas y sus variables seguras.         ║
          ╚═══════════════════════════════════════════════════════════════════════╝
        success_msg: "✓ Variables de despliegue validadas correctamente"

    # -------------------------------------------------------------------------
    # Mostrar Resumen de Roles
    # -------------------------------------------------------------------------
    - name: "📋 Mostrar roles habilitados para este despliegue"
      ansible.builtin.debug:
        msg:
          - ""
          - "════════════════════════════════════════════════════════════════"
          - " ROLES A INSTALAR: {{ ansible_enabled_roles | join(', ') }}"
          - "════════════════════════════════════════════════════════════════"
          - ""

    # -------------------------------------------------------------------------
    # Verificar e Inicializar Docker Swarm
    # -------------------------------------------------------------------------
    - name: "🐳 Verificar estado de Docker Swarm"
      community.docker.docker_swarm_info:
      register: swarm_info
      ignore_errors: yes

    - name: "🐳 Inicializar Docker Swarm si está inactivo"
      community.docker.docker_swarm:
        state: present
      when: >
        swarm_info.failed or 
        (not swarm_info.get('can_operate', False)) or 
        (swarm_info.get('swarm_facts', {}).get('LocalNodeState', '') != 'active')

    # -------------------------------------------------------------------------
    # Crear/Verificar Red Docker Overlay
    # -------------------------------------------------------------------------
    - name: "🌐 Verificar si la red Docker existe"
      community.docker.docker_network_info:
        name: "{{ docker_network_name }}"
      register: network_info

    - name: "🌐 Crear red Docker overlay si no existe"
      community.docker.docker_network:
        name: "{{ docker_network_name }}"
        driver: "{{ docker_network_driver }}"
        scope: swarm
        attachable: "{{ docker_network_attachable }}"
        driver_options:
          encrypted: "true"
      when: "not network_info.exists"

    - name: "🌐 Mostrar estado de la red Docker"
      ansible.builtin.debug:
        msg: "✓ Red '{{ docker_network_name }}' lista para uso"

    # -------------------------------------------------------------------------
    # Resumen Pre-Despliegue
    # -------------------------------------------------------------------------
    - name: "📊 Resumen de Pre-Despliegue"
      ansible.builtin.debug:
        msg:
          - ""
          - "╔══════════════════════════════════════════════════════════════════╗"
          - "║              SYNTALIX-ORION V2 - PRE-DESPLIEGUE              ║"
          - "╠══════════════════════════════════════════════════════════════════╣"
          - "║ Hostname: {{ inventory_hostname }}                                    ║"
          - "║ Roles habilitados: {{ ansible_enabled_roles | length }}                                  ║"
          - "║ Red Docker: {{ docker_network_name }}                                   ║"
          - "╚══════════════════════════════════════════════════════════════════╝"
          - ""

  # ---------------------------------------------------------------------------
  # LISTA UNIFICADA DE ROLES (Orquestación Dinámica)
  # ---------------------------------------------------------------------------
  roles:
    # 🔧 CORE
    - { role: core/traefik, when: "'traefik' in ansible_enabled_roles", tags: [core, traefik] }
    - { role: core/crowdsec, when: "'crowdsec' in ansible_enabled_roles", tags: [core, crowdsec] }
    - { role: core/authentik, when: "'authentik' in ansible_enabled_roles", tags: [core, authentik] }
    - { role: core/portainer, when: "'portainer' in ansible_enabled_roles", tags: [core, portainer] }

    # 💾 DATA
    - { role: data/postgres_pgvector, when: "'postgres_pgvector' in ansible_enabled_roles", tags: [data, postgres] }
    - { role: data/mariadb, when: "'mariadb' in ansible_enabled_roles", tags: [data, mariadb] }
    - { role: data/mongodb, when: "'mongodb' in ansible_enabled_roles", tags: [data, mongodb] }
    - { role: data/redis, when: "'redis' in ansible_enabled_roles", tags: [data, redis] }
    - { role: data/rabbitmq, when: "'rabbitmq' in ansible_enabled_roles", tags: [data, rabbitmq] }
    - { role: data/qdrant, when: "'qdrant' in ansible_enabled_roles", tags: [data, qdrant] }
    - { role: data/minio, when: "'minio' in ansible_enabled_roles", tags: [data, minio] }

    # 📊 MONITORING
    - { role: monitoring/prometheus, when: "'prometheus' in ansible_enabled_roles", tags: [monitoring, prometheus] }
    - { role: monitoring/grafana, when: "'grafana' in ansible_enabled_roles", tags: [monitoring, grafana] }
    - { role: monitoring/loki, when: "'loki' in ansible_enabled_roles", tags: [monitoring, loki] }
    - { role: monitoring/uptime_kuma, when: "'uptime_kuma' in ansible_enabled_roles", tags: [monitoring, uptime_kuma] }

    # 🤖 AI
    - { role: apps_ai/dify, when: "'dify' in ansible_enabled_roles", tags: [ai, dify] }
    - { role: apps_ai/openwebui, when: "'openwebui' in ansible_enabled_roles", tags: [ai, openwebui] }
    - { role: apps_ai/flowise, when: "'flowise' in ansible_enabled_roles", tags: [ai, flowise] }

    # ⚡ AUTOMATION
    - { role: apps_automation/n8n, when: "'n8n' in ansible_enabled_roles", tags: [automation, n8n] }
    - { role: apps_automation/activepieces, when: "'activepieces' in ansible_enabled_roles", tags: [automation, activepieces] }

    # 💬 COMMUNICATION
    - { role: apps_comms/chatwoot, when: "'chatwoot' in ansible_enabled_roles", tags: [comms, chatwoot] }
    - { role: apps_comms/evolution_api, when: "'evolution_api' in ansible_enabled_roles", tags: [comms, evolution_api] }
    - { role: apps_comms/typebot, when: "'typebot' in ansible_enabled_roles", tags: [comms, typebot] }

    # ═══════════════════════════════════════════════════════════════════════
    # 📋 MANAGEMENT - Gestión Empresarial
    # ═══════════════════════════════════════════════════════════════════════

    # - role: apps_management/glpi
    #   when: "'glpi' in ansible_enabled_roles"
    #   tags: [management, glpi, helpdesk, itsm, asset]

    # - role: apps_management/odoo
    #   when: "'odoo' in ansible_enabled_roles"
    #   tags: [management, odoo, erp, crm, business]

    # - role: apps_management/nocodb
    #   when: "'nocodb' in ansible_enabled_roles"
    #   tags: [management, nocodb, database, spreadsheet, nocode]

    # - role: apps_management/vaultwarden
    #   when: "'vaultwarden' in ansible_enabled_roles"
    #   tags: [management, vaultwarden, password, vault, security]

  # ---------------------------------------------------------------------------
  # POST-TASKS: Resumen y Verificación Final
  # ---------------------------------------------------------------------------
  post_tasks:

    - name: "Resumen de Despliegue Completado"
      ansible.builtin.debug:
        msg:
          - "========================================================================"
          - "           SYNTALIX-ORION V2 - DESPLIEGUE COMPLETADO"
          - "========================================================================"
          - " Roles instalados: {{ ansible_enabled_roles | length }}"
          - "========================================================================"

    - name: "Listar servicios desplegados"
      ansible.builtin.debug:
        msg: "{{ ansible_enabled_roles | map('regex_replace', '^', '  * ') | list }}"

    - name: "URLs de Acceso"
      ansible.builtin.debug:
        msg:
          - " URLs de Acceso:"
          - "   - Traefik: https://traefik.{{ lookup('vars', 'TRAEFIK__TRAEFIK_DASHBOARD_URL', default='localhost') }}"
          - "   - Portainer: https://portainer.{{ lookup('vars', 'TRAEFIK__TRAEFIK_DASHBOARD_URL', default='localhost') }}"

    - name: "Comandos utiles post-despliegue"
      ansible.builtin.debug:
        msg:
          - "Comandos utiles:"
          - "  docker stack ls"
          - "  docker service logs <service_name>"

    - name: "Mensaje Final"
      when: "ansible_check_mode | default(false) == false"
      ansible.builtin.debug:
        msg:
          - "========================================================================"
          - "                      ¡DESPLIEGUE EXITOSO!"
          - " "
          - " Syntalix-Orion V2 ha completado la instalacion de los roles seleccionados."
          - " "
          - " RECORDATORIOS IMPORTANTES:"
          - "   - Los secretos estan guardados de forma segura en .env"
          - "     (¡NUNCA COMMITEAR este archivo a Git!)"
          - "========================================================================"
