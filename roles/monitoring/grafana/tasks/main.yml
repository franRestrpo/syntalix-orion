---
- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para grafana"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "grafana"
      dominio: "{{ lookup('vars', 'GRAFANA__DOMAIN', default=lookup('vars', 'GRAFANA_DOMAIN', default=GRAFANA__TRAEFIK_DASHBOARD_URL | default('grafana.localhost'))) }}"
      usuario_admin: "{{ lookup('vars', 'GRAFANA__ADMIN_EMAIL', default=GRAFANA__TRAEFIK_USER | default('admin')) }}"
      acme_email: "{{ GRAFANA__ACME_EMAIL | default('admin@localhost') }}"
      password_db: "{{ lookup('vars', 'POSTGRES_PGVECTOR__POSTGRES_PASSWORD', default=GRAFANA__DB_PASSWORD | default('securepass')) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para grafana"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/grafana.env.j2"
    dest: "{{ playbook_dir }}/deploy/grafana.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para grafana"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/grafana.yml.j2"
    dest: "{{ playbook_dir }}/deploy/grafana_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack grafana"
  ansible.builtin.command:
    cmd: "docker stack deploy -c grafana_stack.yml grafana"
    chdir: "{{ playbook_dir }}/deploy"
  when: not config_stack.failed | default(false)
