---
- name: "Crear directorio de secrets si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/secrets"
    state: directory
    mode: "0700"

- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para grafana"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "grafana"
      dominio: "{{ lookup('vars', 'GRAFANA__DOMAIN', default=lookup('vars', 'GRAFANA_DOMAIN', default='grafana.localhost')) }}"
      usuario_admin: "{{ lookup('vars', 'GRAFANA__USER', default=lookup('vars', 'GRAFANA_USER', default='admin')) }}"
      acme_email: "{{ lookup('vars', 'GRAFANA__ACME_EMAIL', default='admin@localhost') }}"

- name: "Generar archivo .env para grafana en secrets/"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/grafana.env.j2"
    dest: "{{ playbook_dir }}/secrets/grafana.env"
  register: config_env

- name: "Generar docker-compose para grafana"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/grafana.yml.j2"
    dest: "{{ playbook_dir }}/deploy/grafana_stack.yml"
  register: config_stack

- name: "Desplegar Stack grafana"
  ansible.builtin.command:
    cmd: "docker stack deploy -c {{ playbook_dir }}/deploy/grafana_stack.yml grafana"
  when: not config_stack.failed | default(false)
