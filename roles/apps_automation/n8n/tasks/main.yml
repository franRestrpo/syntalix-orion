---
- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para n8n"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "n8n"
      dominio: "{{ lookup('vars', 'N8N__N8N_DOMAIN', default=lookup('vars', 'N8N_DOMAIN', default='n8n.localhost')) }}"
      acme_email: "{{ lookup('vars', 'TRAEFIK__ACME_EMAIL', default='admin@localhost') }}"
      password_db: "{{ lookup('vars', 'POSTGRES_PGVECTOR__POSTGRES_PASSWORD', default='securepass') }}"
      basic_auth: "{{ lookup('vars', 'N8N__N8N_BASIC_AUTH', default='admin:securepass') }}"

- name: "Generar archivo .env para n8n"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/n8n.env.j2"
    dest: "{{ playbook_dir }}/deploy/n8n.env"
  register: config_env

- name: "Generar docker-compose para n8n"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/n8n.yml.j2"
    dest: "{{ playbook_dir }}/deploy/n8n_stack.yml"
  register: config_stack

- name: "🚀 Desplegar Stack n8n en Docker Swarm"
  ansible.builtin.command:
    cmd: "docker stack deploy -c n8n_stack.yml n8n"
    chdir: "{{ playbook_dir }}/deploy"
  when: not config_stack.failed | default(false)
  register: stack_deploy
  changed_when: "'Creating' in stack_deploy.stdout or 'Updating' in stack_deploy.stdout"
