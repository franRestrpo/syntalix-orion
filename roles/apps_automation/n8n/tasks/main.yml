---
- name: "Crear directorio de secrets si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/secrets"
    state: directory
    mode: "0700"

- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para n8n"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "n8n"
      dominio: "{{ N8N__DOMAIN | default('n8n.localhost', true) }}"
      acme_email: "{{ TRAEFIK__ACME_EMAIL | default('admin@localhost', true) }}"
      password_db: "{{ POSTGRES_PGVECTOR__POSTGRES_PASSWORD | default('securepass', true) }}"
      basic_auth: "{{ N8N__N8N_BASIC_AUTH | default('admin:securepass', true) }}"

- name: "Generar archivo .env para n8n en secrets/"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/n8n.env.j2"
    dest: "{{ playbook_dir }}/secrets/n8n.env"
  register: config_env

- name: "Generar docker-compose para n8n"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/n8n.yml.j2"
    dest: "{{ playbook_dir }}/deploy/n8n_stack.yml"
  register: config_stack

- name: "🚀 Desplegar Stack n8n en Docker Swarm"
  ansible.builtin.command:
    cmd: "docker stack deploy -c {{ playbook_dir }}/deploy/n8n_stack.yml n8n"
  when: not config_stack.failed | default(false)
  register: stack_deploy
  changed_when: "'Creating' in stack_deploy.stdout or 'Updating' in stack_deploy.stdout"
