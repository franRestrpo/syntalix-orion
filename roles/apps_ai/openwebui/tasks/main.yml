---
- name: "Crear directorio de secrets si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/secrets"
    state: directory
    mode: "0700"

- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para openwebui"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "openwebui"
      dominio: "{{ lookup('vars', 'OPENWEBUI__DOMAIN', default=lookup('vars', 'OPENWEBUI_DOMAIN', default=OPENWEBUI__TRAEFIK_DASHBOARD_URL | default('openwebui.localhost', true))) }}"
      usuario_admin: "{{ lookup('vars', 'OPENWEBUI__ADMIN_EMAIL', default=OPENWEBUI__TRAEFIK_USER | default('admin', true)) }}"
      acme_email: "{{ OPENWEBUI__ACME_EMAIL | default('admin@localhost', true) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para openwebui en secrets/"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/openwebui.env.j2"
    dest: "{{ playbook_dir }}/secrets/openwebui.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para openwebui"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/openwebui.yml.j2"
    dest: "{{ playbook_dir }}/deploy/openwebui_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack openwebui"
  ansible.builtin.command:
    cmd: "docker stack deploy -c {{ playbook_dir }}/deploy/openwebui_stack.yml openwebui"
  when: not config_stack.failed | default(false)
