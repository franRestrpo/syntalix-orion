---
- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para flowise"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "flowise"
      dominio: "{{ lookup('vars', 'FLOWISE__DOMAIN', default=lookup('vars', 'FLOWISE_DOMAIN', default=lookup('vars', 'FLOWISE__TRAEFIK_DASHBOARD_URL', default='flowise.localhost'))) }}"
      usuario_admin: "{{ lookup('vars', 'FLOWISE__ADMIN_EMAIL', default=lookup('vars', 'FLOWISE__TRAEFIK_USER', default='admin')) }}"
      acme_email: "{{ lookup('vars', 'FLOWISE__ACME_EMAIL', default='admin@localhost') }}"
      password_db: "{{ lookup('vars', 'POSTGRES_PGVECTOR__POSTGRES_PASSWORD', default=lookup('vars', 'FLOWISE__DB_PASSWORD', default='securepass')) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para flowise"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/Orion-Python-Ansible/ansible/roles/desplegador_aplicaciones/templates/flowise.env.j2"
    dest: "{{ playbook_dir }}/deploy/flowise.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para flowise"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/Orion-Python-Ansible/ansible/roles/desplegador_aplicaciones/templates/flowise.yml.j2"
    dest: "{{ playbook_dir }}/deploy/flowise_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack flowise"
  ansible.builtin.command:
    cmd: "docker stack deploy -c flowise_stack.yml flowise"
    chdir: "{{ playbook_dir }}/deploy"
  when: not config_stack.failed | default(false)
