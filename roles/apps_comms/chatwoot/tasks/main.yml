---
- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para chatwoot"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "chatwoot"
      dominio: "{{ lookup('vars', 'CHATWOOT__DOMAIN', default=lookup('vars', 'CHATWOOT_DOMAIN', default=lookup('vars', 'CHATWOOT__TRAEFIK_DASHBOARD_URL', default='chatwoot.localhost'))) }}"
      usuario_admin: "{{ lookup('vars', 'CHATWOOT__ADMIN_EMAIL', default=lookup('vars', 'CHATWOOT__TRAEFIK_USER', default='admin')) }}"
      acme_email: "{{ lookup('vars', 'CHATWOOT__ACME_EMAIL', default='admin@localhost') }}"
      password_db: "{{ lookup('vars', 'POSTGRES_PGVECTOR__POSTGRES_PASSWORD', default=lookup('vars', 'CHATWOOT__DB_PASSWORD', default='securepass')) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para chatwoot"
  ansible.builtin.template:
    src: "chatwoot.env.j2"
    dest: "{{ playbook_dir }}/deploy/chatwoot.env"
  register: config_env

- name: "Generar docker-compose para chatwoot"
  ansible.builtin.template:
    src: "chatwoot.yml.j2"
    dest: "{{ playbook_dir }}/deploy/chatwoot_stack.yml"
  register: config_stack

- name: "🚀 Desplegar Stack chatwoot en Docker Swarm"
  ansible.builtin.command:
    cmd: "docker stack deploy -c chatwoot_stack.yml chatwoot"
    chdir: "{{ playbook_dir }}/deploy"
  when: not config_stack.failed | default(false)
  register: stack_deploy
  changed_when: "'Creating' in stack_deploy.stdout or 'Updating' in stack_deploy.stdout"
