---
- name: "Crear directorio de secrets si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/secrets"
    state: directory
    mode: "0700"

- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para mongodb"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "mongodb"
      dominio: "{{ lookup('vars', 'MONGODB__DOMAIN', default=lookup('vars', 'MONGODB_DOMAIN', default=MONGODB__TRAEFIK_DASHBOARD_URL | default('mongodb.localhost', true))) }}"
      usuario_admin: "{{ lookup('vars', 'MONGODB__ADMIN_EMAIL', default=MONGODB__TRAEFIK_USER | default('admin', true)) }}"
      acme_email: "{{ MONGODB__ACME_EMAIL | default('admin@localhost', true) }}"
      password_db: "{{ lookup('vars', 'POSTGRES_PGVECTOR__POSTGRES_PASSWORD', default=MONGODB__DB_PASSWORD | default('securepass', true)) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para mongodb en secrets/"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/mongodb.env.j2"
    dest: "{{ playbook_dir }}/secrets/mongodb.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para mongodb"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/mongodb.yml.j2"
    dest: "{{ playbook_dir }}/deploy/mongodb_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack mongodb"
  ansible.builtin.command:
    cmd: "docker stack deploy -c {{ playbook_dir }}/deploy/mongodb_stack.yml mongodb"
  when: not config_stack.failed | default(false)
