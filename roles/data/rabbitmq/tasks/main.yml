---
- name: "Crear directorio de secrets si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/secrets"
    state: directory
    mode: "0700"

- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para rabbitmq"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "rabbitmq"
      dominio: "{{ lookup('vars', 'RABBITMQ__DOMAIN', default=lookup('vars', 'RABBITMQ_DOMAIN', default=RABBITMQ__TRAEFIK_DASHBOARD_URL | default('rabbitmq.localhost', true))) }}"
      usuario_admin: "{{ lookup('vars', 'RABBITMQ__ADMIN_EMAIL', default=RABBITMQ__TRAEFIK_USER | default('admin', true)) }}"
      acme_email: "{{ RABBITMQ__ACME_EMAIL | default('admin@localhost', true) }}"
      password_db: "{{ lookup('vars', 'POSTGRES_PGVECTOR__POSTGRES_PASSWORD', default=RABBITMQ__DB_PASSWORD | default('securepass', true)) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para rabbitmq en secrets/"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/rabbitmq.env.j2"
    dest: "{{ playbook_dir }}/secrets/rabbitmq.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para rabbitmq"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/rabbitmq.yml.j2"
    dest: "{{ playbook_dir }}/deploy/rabbitmq_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack rabbitmq"
  ansible.builtin.command:
    cmd: "docker stack deploy -c {{ playbook_dir }}/deploy/rabbitmq_stack.yml rabbitmq"
  when: not config_stack.failed | default(false)
