---
- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para qdrant"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "qdrant"
      dominio: "{{ lookup('vars', 'QDRANT__DOMAIN', default=lookup('vars', 'QDRANT_DOMAIN', default=QDRANT__TRAEFIK_DASHBOARD_URL | default('qdrant.localhost', true))) }}"
      usuario_admin: "{{ lookup('vars', 'QDRANT__ADMIN_EMAIL', default=QDRANT__TRAEFIK_USER | default('admin', true)) }}"
      acme_email: "{{ QDRANT__ACME_EMAIL | default('admin@localhost', true) }}"
      password_db: "{{ lookup('vars', 'POSTGRES_PGVECTOR__POSTGRES_PASSWORD', default=QDRANT__DB_PASSWORD | default('securepass', true)) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para qdrant"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/qdrant.env.j2"
    dest: "{{ playbook_dir }}/deploy/qdrant.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para qdrant"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/qdrant.yml.j2"
    dest: "{{ playbook_dir }}/deploy/qdrant_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack qdrant"
  ansible.builtin.command:
    cmd: "docker stack deploy -c {{ playbook_dir }}/deploy/qdrant_stack.yml qdrant"
  when: not config_stack.failed | default(false)
