---
- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para redis"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "redis"
      dominio: "{{ lookup('vars', 'REDIS__DOMAIN', default=lookup('vars', 'REDIS_DOMAIN', default=lookup('vars', 'REDIS__TRAEFIK_DASHBOARD_URL', default='redis.localhost'))) }}"
      usuario_admin: "{{ lookup('vars', 'REDIS__ADMIN_EMAIL', default=lookup('vars', 'REDIS__TRAEFIK_USER', default='admin')) }}"
      acme_email: "{{ lookup('vars', 'REDIS__ACME_EMAIL', default='admin@localhost') }}"
      password_db: "{{ lookup('vars', 'POSTGRES_PGVECTOR__POSTGRES_PASSWORD', default=lookup('vars', 'REDIS__DB_PASSWORD', default='securepass')) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para redis"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/Orion-Python-Ansible/ansible/roles/desplegador_aplicaciones/templates/redis.env.j2"
    dest: "{{ playbook_dir }}/deploy/redis.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para redis"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/Orion-Python-Ansible/ansible/roles/desplegador_aplicaciones/templates/redis.yml.j2"
    dest: "{{ playbook_dir }}/deploy/redis_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack redis"
  ansible.builtin.command:
    cmd: "docker stack deploy -c redis_stack.yml redis"
    chdir: "{{ playbook_dir }}/deploy"
  when: not config_stack.failed | default(false)
