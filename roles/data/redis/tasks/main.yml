---
- name: "Crear directorio de secrets si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/secrets"
    state: directory
    mode: "0700"

- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para redis"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "redis"
      dominio: "{{ lookup('vars', 'REDIS__DOMAIN', default=lookup('vars', 'REDIS_DOMAIN', default=REDIS__TRAEFIK_DASHBOARD_URL | default('redis.localhost', true))) }}"
      usuario_admin: "{{ lookup('vars', 'REDIS__ADMIN_EMAIL', default=REDIS__TRAEFIK_USER | default('admin', true)) }}"
      acme_email: "{{ REDIS__ACME_EMAIL | default('admin@localhost', true) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para redis en secrets/"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/redis.env.j2"
    dest: "{{ playbook_dir }}/secrets/redis.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para redis"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/redis.yml.j2"
    dest: "{{ playbook_dir }}/deploy/redis_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack redis"
  ansible.builtin.command:
    cmd: "docker stack deploy -c {{ playbook_dir }}/deploy/redis_stack.yml redis"
  when: not config_stack.failed | default(false)
