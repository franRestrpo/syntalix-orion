---
- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para postgres_pgvector"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "postgres_pgvector"
      dominio: "{{ lookup('vars', 'POSTGRES_PGVECTOR__DOMAIN', default=lookup('vars', 'POSTGRES_PGVECTOR_DOMAIN', default=lookup('vars', 'POSTGRES_PGVECTOR__TRAEFIK_DASHBOARD_URL', default='postgres_pgvector.localhost'))) }}"
      usuario_admin: "{{ lookup('vars', 'POSTGRES_PGVECTOR__ADMIN_EMAIL', default=lookup('vars', 'POSTGRES_PGVECTOR__TRAEFIK_USER', default='admin')) }}"
      acme_email: "{{ lookup('vars', 'POSTGRES_PGVECTOR__ACME_EMAIL', default='admin@localhost') }}"
      password_db: "{{ lookup('vars', 'POSTGRES_PGVECTOR__POSTGRES_PASSWORD', default=lookup('vars', 'POSTGRES_PGVECTOR__DB_PASSWORD', default='securepass')) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para postgres_pgvector"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/Orion-Python-Ansible/ansible/roles/desplegador_aplicaciones/templates/postgres_pgvector.env.j2"
    dest: "{{ playbook_dir }}/deploy/postgres_pgvector.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para postgres_pgvector"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/Orion-Python-Ansible/ansible/roles/desplegador_aplicaciones/templates/postgres_pgvector.yml.j2"
    dest: "{{ playbook_dir }}/deploy/postgres_pgvector_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack postgres_pgvector"
  ansible.builtin.command:
    cmd: "docker stack deploy -c postgres_pgvector_stack.yml postgres_pgvector"
    chdir: "{{ playbook_dir }}/deploy"
  when: not config_stack.failed | default(false)
