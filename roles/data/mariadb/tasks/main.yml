---
- name: "Crear directorio de secrets si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/secrets"
    state: directory
    mode: "0700"

- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para mariadb"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "mariadb"
      dominio: "{{ lookup('vars', 'MARIADB__DOMAIN', default=lookup('vars', 'MARIADB_DOMAIN', default=MARIADB__TRAEFIK_DASHBOARD_URL | default('mariadb.localhost', true))) }}"
      usuario_admin: "{{ lookup('vars', 'MARIADB__ADMIN_EMAIL', default=MARIADB__TRAEFIK_USER | default('admin', true)) }}"
      acme_email: "{{ MARIADB__ACME_EMAIL | default('admin@localhost', true) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para mariadb en secrets/"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/mariadb.env.j2"
    dest: "{{ playbook_dir }}/secrets/mariadb.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para mariadb"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/mariadb.yml.j2"
    dest: "{{ playbook_dir }}/deploy/mariadb_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack mariadb"
  ansible.builtin.command:
    cmd: "docker stack deploy -c {{ playbook_dir }}/deploy/mariadb_stack.yml mariadb"
  when: not config_stack.failed | default(false)
