---
- name: "Crear directorio de secrets si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/secrets"
    state: directory
    mode: "0700"

- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para minio"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "minio"
      dominio: "{{ lookup('vars', 'MINIO__DOMAIN', default=lookup('vars', 'MINIO_DOMAIN', default=MINIO__TRAEFIK_DASHBOARD_URL | default('minio.localhost', true))) }}"
      usuario_admin: "{{ lookup('vars', 'MINIO__ADMIN_EMAIL', default=MINIO__TRAEFIK_USER | default('admin', true)) }}"
      acme_email: "{{ MINIO__ACME_EMAIL | default('admin@localhost', true) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para minio en secrets/"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/minio.env.j2"
    dest: "{{ playbook_dir }}/secrets/minio.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para minio"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/minio.yml.j2"
    dest: "{{ playbook_dir }}/deploy/minio_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack minio"
  ansible.builtin.command:
    cmd: "docker stack deploy -c {{ playbook_dir }}/deploy/minio_stack.yml minio"
  when: not config_stack.failed | default(false)
