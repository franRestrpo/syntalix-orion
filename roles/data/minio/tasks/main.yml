---
- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para minio"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "minio"
      dominio: "{{ lookup('vars', 'MINIO__DOMAIN', default=lookup('vars', 'MINIO_DOMAIN', default=lookup('vars', 'MINIO__TRAEFIK_DASHBOARD_URL', default='minio.localhost'))) }}"
      usuario_admin: "{{ lookup('vars', 'MINIO__ADMIN_EMAIL', default=lookup('vars', 'MINIO__TRAEFIK_USER', default='admin')) }}"
      acme_email: "{{ lookup('vars', 'MINIO__ACME_EMAIL', default='admin@localhost') }}"
      password_db: "{{ lookup('vars', 'POSTGRES_PGVECTOR__POSTGRES_PASSWORD', default=lookup('vars', 'MINIO__DB_PASSWORD', default='securepass')) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para minio"
  ansible.builtin.template:
    src: "minio.env.j2"
    dest: "{{ playbook_dir }}/deploy/minio.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para minio"
  ansible.builtin.template:
    src: "minio.yml.j2"
    dest: "{{ playbook_dir }}/deploy/minio_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack minio"
  ansible.builtin.command:
    cmd: "docker stack deploy -c minio_stack.yml minio"
    chdir: "{{ playbook_dir }}/deploy"
  when: not config_stack.failed | default(false)
