---
- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para authentik"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "authentik"
      dominio: "{{ lookup('vars', 'AUTHENTIK__DOMAIN', default=lookup('vars', 'AUTHENTIK_DOMAIN', default=lookup('vars', 'AUTHENTIK__TRAEFIK_DASHBOARD_URL', default='authentik.localhost'))) }}"
      usuario_admin: "{{ lookup('vars', 'AUTHENTIK__ADMIN_EMAIL', default=lookup('vars', 'AUTHENTIK__TRAEFIK_USER', default='admin')) }}"
      acme_email: "{{ lookup('vars', 'AUTHENTIK__ACME_EMAIL', default='admin@localhost') }}"
      password_db: "{{ lookup('vars', 'POSTGRES_PGVECTOR__POSTGRES_PASSWORD', default=lookup('vars', 'AUTHENTIK__DB_PASSWORD', default='securepass')) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para authentik"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/Orion-Python-Ansible/ansible/roles/desplegador_aplicaciones/templates/authentik.env.j2"
    dest: "{{ playbook_dir }}/deploy/authentik.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para authentik"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/Orion-Python-Ansible/ansible/roles/desplegador_aplicaciones/templates/authentik.yml.j2"
    dest: "{{ playbook_dir }}/deploy/authentik_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack authentik"
  ansible.builtin.command:
    cmd: "docker stack deploy -c authentik_stack.yml authentik"
    chdir: "{{ playbook_dir }}/deploy"
  when: not config_stack.failed | default(false)
