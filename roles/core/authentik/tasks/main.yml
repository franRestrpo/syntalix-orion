---
- name: "Crear directorio de secrets si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/secrets"
    state: directory
    mode: "0700"

- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para authentik"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "authentik"
      dominio: "{{ AUTHENTIK__DOMAIN | default('auth.localhost', true) }}"
      usuario_admin: "{{ lookup('vars', 'AUTHENTIK__ADMIN_EMAIL', default=AUTHENTIK__TRAEFIK_USER | default('admin', true)) }}"
      acme_email: "{{ AUTHENTIK__ACME_EMAIL | default('admin@localhost', true) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para authentik en secrets/"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/authentik.env.j2"
    dest: "{{ playbook_dir }}/secrets/authentik.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para authentik"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/authentik.yml.j2"
    dest: "{{ playbook_dir }}/deploy/authentik_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack authentik"
  ansible.builtin.command:
    cmd: "docker stack deploy -c {{ playbook_dir }}/deploy/authentik_stack.yml authentik"
  when: not config_stack.failed | default(false)
