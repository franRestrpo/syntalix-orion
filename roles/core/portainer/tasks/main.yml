---
- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para portainer"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "portainer"
      dominio: "{{ lookup('vars', 'PORTAINER__DOMAIN', default=lookup('vars', 'PORTAINER_DOMAIN', default=lookup('vars', 'PORTAINER__TRAEFIK_DASHBOARD_URL', default='portainer.localhost'))) }}"
      usuario_admin: "{{ lookup('vars', 'PORTAINER__ADMIN_EMAIL', default=lookup('vars', 'PORTAINER__TRAEFIK_USER', default='admin')) }}"
      acme_email: "{{ lookup('vars', 'PORTAINER__ACME_EMAIL', default='admin@localhost') }}"
      password_db: "{{ lookup('vars', 'POSTGRES_PGVECTOR__POSTGRES_PASSWORD', default=lookup('vars', 'PORTAINER__DB_PASSWORD', default='securepass')) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para portainer"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/Orion-Python-Ansible/ansible/roles/desplegador_aplicaciones/templates/portainer.env.j2"
    dest: "{{ playbook_dir }}/deploy/portainer.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para portainer"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/Orion-Python-Ansible/ansible/roles/desplegador_aplicaciones/templates/portainer.yml.j2"
    dest: "{{ playbook_dir }}/deploy/portainer_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack portainer"
  ansible.builtin.command:
    cmd: "docker stack deploy -c portainer_stack.yml portainer"
    chdir: "{{ playbook_dir }}/deploy"
  when: not config_stack.failed | default(false)
