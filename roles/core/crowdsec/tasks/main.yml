---
- name: "Crear directorio de secrets si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/secrets"
    state: directory
    mode: "0700"

- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para crowdsec"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "crowdsec"
      dominio: "{{ lookup('vars', 'CROWDSEC__DOMAIN', default=lookup('vars', 'CROWDSEC_DOMAIN', default=CROWDSEC__TRAEFIK_DASHBOARD_URL | default('crowdsec.localhost', true))) }}"
      usuario_admin: "{{ lookup('vars', 'CROWDSEC__ADMIN_EMAIL', default=CROWDSEC__TRAEFIK_USER | default('admin', true)) }}"
      acme_email: "{{ CROWDSEC__ACME_EMAIL | default('admin@localhost', true) }}"
      password_db: "{{ lookup('vars', 'POSTGRES_PGVECTOR__POSTGRES_PASSWORD', default=CROWDSEC__DB_PASSWORD | default('securepass', true)) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "Generar archivo .env para crowdsec en secrets/"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/crowdsec.env.j2"
    dest: "{{ playbook_dir }}/secrets/crowdsec.env"
  register: config_env
  ignore_errors: true

- name: "Generar docker-compose para crowdsec"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/crowdsec.yml.j2"
    dest: "{{ playbook_dir }}/deploy/crowdsec_stack.yml"
  register: config_stack
  ignore_errors: true

- name: "Desplegar Stack crowdsec"
  ansible.builtin.command:
    cmd: "docker stack deploy -c {{ playbook_dir }}/deploy/crowdsec_stack.yml crowdsec"
  when: not config_stack.failed | default(false)
