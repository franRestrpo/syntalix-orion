---
- name: "Crear directorio de secrets si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/secrets"
    state: directory
    mode: "0700"

- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para traefik"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "traefik"
      dominio: "{{ TRAEFIK__DASHBOARD_URL | default('traefik.localhost', true) }}"
      usuario_admin: "{{ TRAEFIK__USER | default('admin', true) }}"
      acme_email: "{{ TRAEFIK__ACME_EMAIL | default('admin@localhost', true) }}"

- name: "🌐 Asegurar que existen los volúmenes externos necesarios"
  ansible.builtin.shell:
    cmd: "docker volume create {{ item }} || true"
  loop:
    - volume_swarm_shared
    - volume_swarm_certificates
  register: vol_creation
  changed_when: false

- name: "Asegurar que TRAEFIK__PASSWORD tenga un valor por defecto si no está definido"
  ansible.builtin.set_fact:
    TRAEFIK__PASSWORD: "{{ TRAEFIK__PASSWORD | default('password_seguro', true) }}"

- name: "Hash Traefik password if it is in plain text"
  ansible.builtin.shell:
    cmd: "{{ playbook_dir }}/.venv/bin/python -c \"import os, bcrypt; pwd = os.environ['PLAINTEXT_PWD']; print(bcrypt.hashpw(pwd.encode('utf-8'), bcrypt.gensalt()).decode('utf-8').replace('$2b$', '$2y$'))\""
  environment:
    PLAINTEXT_PWD: "{{ TRAEFIK__PASSWORD }}"
  register: traefik_pwd_hash
  when: "not TRAEFIK__PASSWORD.startswith('$2')"
  changed_when: false
  ignore_errors: true

- name: "Update TRAEFIK__PASSWORD with hashed value"
  ansible.builtin.set_fact:
    TRAEFIK__PASSWORD: "{{ traefik_pwd_hash.stdout }}"
  when: "not traefik_pwd_hash.skipped | default(false) and traefik_pwd_hash.stdout is defined and traefik_pwd_hash.stdout != ''"

- name: "Generar archivo .env para traefik en secrets/"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/traefik.env.j2"
    dest: "{{ playbook_dir }}/secrets/traefik.env"
  register: config_env

- name: "Generar docker-compose para traefik"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/traefik.yml.j2"
    dest: "{{ playbook_dir }}/deploy/traefik_stack.yml"
  register: config_stack

- name: "🚀 Desplegar Stack traefik en Docker Swarm"
  ansible.builtin.command:
    cmd: "docker stack deploy -c {{ playbook_dir }}/deploy/traefik_stack.yml traefik"
  when: not config_stack.failed | default(false)
  register: stack_deploy
  changed_when: "'Creating' in stack_deploy.stdout or 'Updating' in stack_deploy.stdout"

