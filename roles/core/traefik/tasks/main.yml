---
- name: "Crear directorio de despliegue si no existe"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/deploy"
    state: directory
    mode: "0755"

- name: "Configurar app_actual para traefik"
  ansible.builtin.set_fact:
    app_actual:
      nombre: "traefik"
      dominio: "{{ lookup('vars', 'TRAEFIK__DOMAIN', default=lookup('vars', 'TRAEFIK_DOMAIN', default=lookup('vars', 'TRAEFIK__TRAEFIK_DASHBOARD_URL', default='traefik.localhost'))) }}"
      usuario_admin: "{{ lookup('vars', 'TRAEFIK__ADMIN_EMAIL', default=lookup('vars', 'TRAEFIK__TRAEFIK_USER', default='admin')) }}"
      acme_email: "{{ lookup('vars', 'TRAEFIK__ACME_EMAIL', default='admin@localhost') }}"
      password_db: "{{ lookup('vars', 'POSTGRES_PGVECTOR__POSTGRES_PASSWORD', default=lookup('vars', 'TRAEFIK__DB_PASSWORD', default='securepass')) }}"
      chatwoot_db_host: "postgres_pgvector"
      chatwoot_redis_host: "redis"

- name: "🌐 Asegurar que existen los volúmenes externos necesarios"
  ansible.builtin.shell:
    cmd: "docker volume create {{ item }} || true"
  loop:
    - volume_swarm_shared
    - volume_swarm_certificates
  register: vol_creation
  changed_when: false

- name: "Generar archivo .env para traefik"
  ansible.builtin.template:
    src: "traefik.env.j2"
    dest: "{{ playbook_dir }}/deploy/traefik.env"
  register: config_env

- name: "Generar docker-compose para traefik"
  ansible.builtin.template:
    src: "traefik.yml.j2"
    dest: "{{ playbook_dir }}/deploy/traefik_stack.yml"
  register: config_stack

- name: "🚀 Desplegar Stack traefik en Docker Swarm"
  ansible.builtin.command:
    cmd: "docker stack deploy -c traefik_stack.yml traefik"
    chdir: "{{ playbook_dir }}/deploy"
  when: not config_stack.failed | default(false)
  register: stack_deploy
  changed_when: "'Creating' in stack_deploy.stdout or 'Updating' in stack_deploy.stdout"

