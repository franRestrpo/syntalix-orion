id: mariadb
name: MariaDB / MySQL
description: Open source relational database
category: Data
version: 10.x
ram_mb: 512
dependencies: []
variables:
  MYSQL_ROOT_PASSWORD:
    type: secret
    description: MySQL root password
    auto_generate: true
  MYSQL_DATABASE:
    type: string
    description: Default database
    default: appdb
  MYSQL_USER:
    type: string
    description: Default database user
    default: orion_admin
  MYSQL_PASSWORD:
    type: secret
    description: Database user password
    auto_generate: true
