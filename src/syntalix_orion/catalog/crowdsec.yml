id: crowdsec
name: CrowdSec
category: Core
version: latest
ram_mb: 256
dependencies:
  - traefik
variables:
  CROWDSEC_ENROLL_KEY:
    type: secret
    description: "CrowdSec Enrollment Key"
    auto_generate: true
    length: 48
  BOUNCER_KEY_TRAEFIK:
    type: secret
    description: "CrowdSec Bouncer Key for Traefik"
    auto_generate: true
    length: 48