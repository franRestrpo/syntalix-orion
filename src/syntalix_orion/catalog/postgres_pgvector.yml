id: postgres_pgvector
name: "Postgres (pgvector)"
category: Data
version: latest
ram_mb: 2048
dependencies: []
variables:
  POSTGRES_PASSWORD:
    type: secret
    description: "PostgreSQL admin password"
    auto_generate: true
    length: 32
  POSTGRES_USER:
    type: string
    description: "Default database user"
    default: "orion_admin"
  POSTGRES_DB:
    type: string
    description: "Default database name"
    default: "appdb"