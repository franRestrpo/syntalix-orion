id: traefik
name: Traefik
category: Core
version: "3.x"
ram_mb: 256
dependencies: []
variables:
  TRAEFIK_DASHBOARD_URL:
    type: domain
    description: "Domain for Traefik Dashboard"
    required: true
    auto_generate: false
  ACME_EMAIL:
    type: email
    description: "Email for Let's Encrypt certificates"
    required: true
    auto_generate: false
  INTERNAL_NETWORK:
    type: string
    description: "Internal Docker Network"
    default: "SyntalixNet"
  TRAEFIK_USER:
    type: string
    description: "Traefik Dashboard Username"
    default: "traefik-admin"
    required: true
  TRAEFIK_PASSWORD:
    type: secret
    description: "Traefik Dashboard Password"
    required: true
    auto_generate: false
    transform: bcrypt