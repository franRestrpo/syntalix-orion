id: grafana
name: Grafana
category: Monitoring
version: latest
ram_mb: 512
dependencies:
  - traefik
  - prometheus
variables:
  GRAFANA_DOMAIN:
    type: domain
    description: "Domain for Grafana Dashboard"
    required: true
    auto_generate: false
  GRAFANA_PASSWORD:
    type: secret
    description: "Grafana admin password"
    required: true
    auto_generate: false